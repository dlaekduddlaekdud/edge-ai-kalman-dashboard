중요 문구:

- "기존 실험 CSV를 분석하고 시각화하는 포트폴리오용 대시보드"
- "Raw 센서값 baseline과 Fixed KF, CM-AKF, TinyML-AKF를 비교"
- "논문 본문에는 포함되지 않으며 졸업논문 평가 기준 밖의 보조 산출물"
- "새로운 조건의 성능을 예측하거나 연구 실험 결과로 주장하지 않음"

### AGENTS.md 또는 에이전트 지침

프로젝트 지침 파일이 있다면 다음 내용으로 정리한다.

```md
# Edge AI Kalman Dashboard

## Project Goal
졸업연구 실험 CSV를 업로드해 칼만 필터 성능 지표를 자동 계산하고 시각화한다.

## Stack
Next.js 15, React 19, TypeScript, Tailwind CSS v4, Recharts, PapaParse, Zustand.

## Core Rules
- CSV 18컬럼 스키마를 유지한다.
- RMSE/MAE/NIS/R RMSE/Tconv/추론 시간 기준은 논문 4.3절을 따른다.
- Tconv는 E1/E2/E3에서 직전 1초(50샘플) 슬라이딩 윈도우 RMSE 기준이며, E0는 epsilon=5 mm 기준이다.
- E1/E3/Ablation을 MVP 우선순위로 둔다.
- 논문 결과를 새로 주장하지 않는다.
```

