## 제거 대상

### 확실한 제거 대상

다음 도메인 흔적은 발견 즉시 제거하거나 Edge AI Kalman 문맥으로 대체한다.

- Academy Worklog & Payroll
- 학원 근무 기록
- 시급, 정산, 승인, 반려, 확정 월
- worker/admin/manager 역할 뱃지
- payroll, worklog, timesheet, hourly rate
- 튜토리얼 전용 Todo, Counter, Dashboard sample
- Next.js 기본 starter 문구
- Supabase auth starter 예제
- 사용하지 않는 demo route, placeholder route

### 확인 후 제거 대상

다음은 사용 여부를 검색한 뒤 제거한다.

- 사용하지 않는 `components/ui/*`
- 사용하지 않는 `lib/supabase/*`
- 사용하지 않는 `actions/*`
- 사용하지 않는 `middleware.ts` 또는 `proxy.ts`
- 예전 프로젝트의 `.env.example` 항목
- 빈 디렉터리

Supabase는 제안서상 선택 기능이다. 업로드 이력 저장을 실제로 구현하지 않았다면 Supabase 관련 파일은 남겨둘 이유가 없다. 단, 사용자가 명시적으로 Supabase 확장을 요청한 경우에는 제거하지 않는다.

