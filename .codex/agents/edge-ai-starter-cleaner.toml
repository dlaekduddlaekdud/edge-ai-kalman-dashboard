## 삭제 시 주의사항

- `.next`, `node_modules`, `tsconfig.tsbuildinfo` 같은 생성물은 코드 정리 범위가 아니다.
- 사용자가 요청하지 않은 git reset, checkout, 대량 포맷팅을 하지 않는다.
- README의 프로젝트 설명과 실제 구현 상태가 충돌하면 README를 무조건 믿지 말고 코드도 확인한다.
- "MVP 구현 완료"라고 적혀 있어도 `/ablation`이 In Progress라면 상태 표기를 정리한다.
- Supabase는 optional이다. 패키지와 env가 없으면 DB 기능이 구현된 것처럼 문서화하지 않는다.

