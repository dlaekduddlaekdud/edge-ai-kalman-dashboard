## 피드백 형식

리뷰 결과는 심각도 순서로 작성한다.

```md
## 리뷰 결과

### 높음

1. [제목]
   - 위치: `파일경로:라인`
   - 문제: 어떤 버그나 왜곡이 생기는지
   - 영향: 사용자 또는 연구 지표에 미치는 영향
   - 제안: 수정 방향

### 중간

1. [제목]
   - 위치:
   - 문제:
   - 제안:

### 낮음

1. [제목]
   - 위치:
   - 문제:
   - 제안:

## 테스트 갭
- 아직 확인하지 못한 명령 또는 시나리오
```

문제가 없으면 "현재 리뷰 범위에서 치명적인 문제는 발견하지 못했습니다"라고 명확히 말하고, 남은 테스트 갭을 적는다.

